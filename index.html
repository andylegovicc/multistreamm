<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDC Multistream</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 50vh 50vh;
    gap: 4px;
  }

  .frame {
    position: relative;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    top: 0;
    left: 0;

    /* KEY PART (balanced zoom fix) */
    width: 125%;
    height: 125%;
    transform: scale(0.8);
    transform-origin: top left;

    border: none;
  }
</style>
</head>

<body>

  <div class="frame">
    <iframe src="https://www.pdc.tv/live/764fe0dc-11be-4ec3-9567-b80d85db0d8a"></iframe>
  </div>

  <div class="frame">
    <iframe src="https://www.pdc.tv/live/f9ee0e22-8ddb-4e0b-81cc-c9850eae0eb5"></iframe>
  </div>

  <div class="frame">
    <iframe src="https://www.pdc.tv/live/ae28afb0-6a60-4208-a2b8-22bb0a7f2221"></iframe>
  </div>

  <div class="frame">
    <iframe src="https://www.pdc.tv/live/9deb5734-be88-4c6a-9520-b9d77419bb8d"></iframe>
  </div>

</body>
</html>
