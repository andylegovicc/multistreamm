<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDC Multistream</title>
  <style>
    <style>
  body {
    margin: 0;
    background: #0e0e0e;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 50vh);
    gap: 4px;
  }

  .frame {
    position: relative;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 140%;   /* zoom OUT trick */
    height: 140%;
    transform: scale(0.7);  /* adjust this */
    transform-origin: top left;
    border: none;
  }
</style>
</head>
